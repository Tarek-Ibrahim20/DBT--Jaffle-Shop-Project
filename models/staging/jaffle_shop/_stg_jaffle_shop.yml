models:
  - name: stg_jaffle_shop__customers
    description: "Staging model for the jaffle_shop customers data"
    columns:
      - name: customer_id
        description: "The unique identifier for each customer."
        tests:
          - not_null
          - unique

  - name: stg_jaffle_shop__orders
    description: "Staging model for the jaffle_shop orders data"
    columns:
      - name: order_id
        description: "The unique identifier for each order."
        tests:
          - not_null
          - unique
      - name: status
        description: "{{doc('order_status')}}"
        tests:
          - accepted_values:
              arguments:
                values: ['completed', 'placed', 'return_pending' , 'returned', 'shipped']          
      - name: customer_id
        description: "The identifier for the customer who placed the order."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop__customers')
                field: customer_id          