models:
  - name: stg_stripe__payments
    description: here is data related to paymenst of orders
    tests:
      - dbt_utils.uique_combination_of_columns:
          arguments:
            combination_of_columns:
            - order_id
            - payment_method
    columns:
      - name: amount
        description: amount column that holds the money paid to get the orders
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">0"
